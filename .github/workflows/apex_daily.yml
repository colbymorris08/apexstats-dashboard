# Daily 6:00 AM Pacific: rebuild JSON, push to GitHub Pages repo, PDF + email.
# Mirrors: zsh apex_daily_manual.sh (Mac can keep LaunchAgent as backup).
name: Apex daily

on:
  schedule:
    - cron: "0 6 * * *"
      timezone: America/Los_Angeles
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apex-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: America/Los_Angeles
      # Silence Node 20 deprecation notice on checkout/setup-python (harmless).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apex_dashboard_requirements.txt

      - name: Install dependencies
        run: pip install -r apex_dashboard_requirements.txt

      - name: Build dashboard JSON
        run: python3 apex_dashboard_builder.py

      - name: Commit and push dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apex_dashboard_data.json
          if git diff --cached --quiet; then
            echo "No JSON changes to commit."
          else
            git commit -m "Auto-refresh Apex dashboard data (GitHub Actions)"
            git pull --rebase origin main
            git push
          fi

      - name: Verify email secrets
        env:
          APEX_SMTP_HOST: ${{ secrets.APEX_SMTP_HOST }}
          APEX_SMTP_PORT: ${{ secrets.APEX_SMTP_PORT }}
          APEX_SMTP_USER: ${{ secrets.APEX_SMTP_USER }}
          APEX_SMTP_PASSWORD: ${{ secrets.APEX_SMTP_PASSWORD }}
          APEX_PDF_EMAIL_FROM: ${{ secrets.APEX_PDF_EMAIL_FROM }}
          APEX_PDF_EMAIL_TO: ${{ secrets.APEX_PDF_EMAIL_TO }}
        run: |
          missing=0
          for name in APEX_SMTP_HOST APEX_SMTP_PORT APEX_SMTP_USER APEX_SMTP_PASSWORD APEX_PDF_EMAIL_FROM APEX_PDF_EMAIL_TO; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing repository secret: $name — add under Settings → Secrets and variables → Actions (not Dependabot or Codespaces)."
              missing=1
            fi
          done
          [[ "$missing" -eq 0 ]]

      - name: Build PDF and send email
        env:
          APEX_SMTP_HOST: ${{ secrets.APEX_SMTP_HOST }}
          APEX_SMTP_PORT: ${{ secrets.APEX_SMTP_PORT }}
          APEX_SMTP_USER: ${{ secrets.APEX_SMTP_USER }}
          APEX_SMTP_PASSWORD: ${{ secrets.APEX_SMTP_PASSWORD }}
          APEX_SMTP_USE_SSL: ${{ secrets.APEX_SMTP_USE_SSL }}
          APEX_PDF_EMAIL_FROM: ${{ secrets.APEX_PDF_EMAIL_FROM }}
          APEX_PDF_EMAIL_TO: ${{ secrets.APEX_PDF_EMAIL_TO }}
        run: python3 apex_last_night_pdf_email.py
