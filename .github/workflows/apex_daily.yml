# Daily 6:00 AM Pacific (+ 7:00 backup): rebuild JSON, push site, PDF + email.
# Runs on GitHub — Mac can be off. Email dedup = one message per last_night_date.
name: Apex daily

on:
  schedule:
    - cron: "0 6 * * *"
      timezone: America/Los_Angeles
    # GitHub often skips a single cron; backup run dedupes email if 6 AM already sent.
    - cron: "0 7 * * *"
      timezone: America/Los_Angeles
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apex-daily
  cancel-in-progress: true

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: America/Los_Angeles
      APEX_DAILY_FAST: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apex_dashboard_requirements.txt

      - name: Install dependencies
        run: pip install -r apex_dashboard_requirements.txt

      - name: Build dashboard JSON
        id: build
        continue-on-error: true
        timeout-minutes: 90
        run: python3 apex_dashboard_builder.py

      - name: Commit and push dashboard data
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apex_dashboard_data.json
          if git diff --cached --quiet; then
            echo "No JSON changes to commit."
          else
            git commit -m "Auto-refresh Apex dashboard data (GitHub Actions)"
          fi
          git pull --rebase --autostash origin main || true
          git push || echo "::warning::git push failed; PDF/email will still run."

      - name: Restore JSON if build failed
        if: steps.build.outcome == 'failure'
        run: git checkout HEAD -- apex_dashboard_data.json

      - name: Validate dashboard JSON
        id: json_ok
        continue-on-error: true
        run: python3 -c "import json; json.load(open('apex_dashboard_data.json'))"

      - name: Restore JSON if invalid
        if: steps.json_ok.outcome == 'failure'
        run: git checkout HEAD -- apex_dashboard_data.json

      - name: Verify email secrets
        env:
          APEX_SMTP_HOST: ${{ secrets.APEX_SMTP_HOST }}
          APEX_SMTP_PORT: ${{ secrets.APEX_SMTP_PORT }}
          APEX_SMTP_USER: ${{ secrets.APEX_SMTP_USER }}
          APEX_SMTP_PASSWORD: ${{ secrets.APEX_SMTP_PASSWORD }}
          APEX_PDF_EMAIL_FROM: ${{ secrets.APEX_PDF_EMAIL_FROM }}
          APEX_PDF_EMAIL_TO: ${{ secrets.APEX_PDF_EMAIL_TO }}
        run: |
          missing=0
          for name in APEX_SMTP_HOST APEX_SMTP_PORT APEX_SMTP_USER APEX_SMTP_PASSWORD APEX_PDF_EMAIL_FROM APEX_PDF_EMAIL_TO; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing repository secret: $name"
              missing=1
            fi
          done
          [[ "$missing" -eq 0 ]]

      - name: Email sent cache
        uses: actions/cache@v4
        with:
          path: .apex_email_sent_date
          key: apex-daily-email-v1

      - name: Build PDF and send email
        if: ${{ always() && steps.build.outcome != 'cancelled' }}
        env:
          APEX_SMTP_HOST: ${{ secrets.APEX_SMTP_HOST }}
          APEX_SMTP_PORT: ${{ secrets.APEX_SMTP_PORT }}
          APEX_SMTP_USER: ${{ secrets.APEX_SMTP_USER }}
          APEX_SMTP_PASSWORD: ${{ secrets.APEX_SMTP_PASSWORD }}
          APEX_SMTP_USE_SSL: ${{ secrets.APEX_SMTP_USE_SSL }}
          APEX_PDF_EMAIL_FROM: ${{ secrets.APEX_PDF_EMAIL_FROM }}
          APEX_PDF_EMAIL_TO: ${{ secrets.APEX_PDF_EMAIL_TO }}
        run: python3 apex_last_night_pdf_email.py
