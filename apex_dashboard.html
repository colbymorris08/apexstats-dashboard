<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apex Client Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 16px;
      background: #f0f0f0;
      color: #1a1a1a;
    }
    h1 { margin: 0 0 12px; font-size: 22px; font-weight: 700; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    button {
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    button.active { background: #1e3a5f; border-color: #1e3a5f; color: #fff; }
    .muted { color: #555; font-size: 13px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .stats-section-title {
      font-size: 16px;
      font-weight: 800;
      color: #1e3a5f;
      margin: 20px 0 8px 0;
      padding-bottom: 4px;
      border-bottom: 2px solid #1e3a5f;
    }
    .stats-section-title:first-child { margin-top: 0; }
    .stats-wrap { margin-top: 8px; }
    table.stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 8px;
      background: #fff;
    }
    table.stats-table th {
      background: #1e3a5f;
      color: #fff;
      font-weight: 700;
      text-align: center;
      padding: 10px 8px;
      border: 1px solid #ccc;
    }
    table.stats-table td {
      text-align: center;
      padding: 8px;
      border: 1px solid #d0d0d0;
      background: #fff;
      color: #1a1a1a;
    }
    table.stats-table td.text-left { text-align: left; }
    table.stats-table th.sortable { cursor: pointer; user-select: none; }
    table.stats-table th.sortable:hover { filter: brightness(1.08); }
    table.stats-table a { color: #1e40af; }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .modal {
      width: min(980px, 95vw);
      max-height: 85vh;
      overflow: auto;
      background: #fff;
      border-radius: 10px;
      border: 1px solid #d0d0d0;
      padding: 14px 16px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .modal-close {
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #fff;
      padding: 4px 8px;
      cursor: pointer;
      font-weight: 700;
    }
    .modal h3 {
      margin: 8px 0;
      font-size: 16px;
      color: #1e3a5f;
    }
    .modal table { width: 100%; border-collapse: collapse; }
    .modal th, .modal td {
      border: 1px solid #ddd;
      padding: 6px;
      font-size: 13px;
      text-align: left;
    }
    .modal th { background: #f4f7fb; }
  </style>
</head>
<body>
  <h1>Apex Baseball Client Dashboard</h1>
  <div class="muted" id="meta"></div>
  <div class="muted" id="lastNightLabel" style="margin: 6px 0 10px 0;"></div>
  <div class="row" id="viewTabs">
    <button data-view="desktop" class="active">Desktop View</button>
    <button data-view="mobile">Mobile View</button>
  </div>
  <div class="row" id="mainTabs">
    <button data-tab="mlb" class="active">MLB</button>
    <button data-tab="milb">MiLB/Overseas</button>
    <button data-tab="amateur">Amateur Clients</button>
    <button data-tab="high_school">High School</button>
  </div>
  <div class="row" id="subTabs">
    <button data-subtab="last_night" class="active">Last Night Stats</button>
    <button data-subtab="month_to_date">Month-To-Date Stats</button>
    <button data-subtab="season">Season Stats</button>
    <button data-subtab="schedule">Upcoming Series Locations</button>
  </div>
  <div class="row" id="roleTabs">
    <button data-role="all" class="active">All</button>
    <button data-role="pitchers">Pitchers</button>
    <button data-role="hitters">Hitters</button>

  <div id="panel-milb" class="panel"></div>
  <div id="panel-amateur" class="panel"></div>
  <div id="panel-high_school" class="panel"></div>

      { keys: ["runs", "r"], header: "R", kind: "int" },

      { keys: ["baseOnBalls", "bb"], header: "BB", kind: "int" },
      { keys: ["strikeOuts", "k", "so"], header: "K", kind: "int" },
      { keys: ["homeRuns", "hr"], header: "HR", kind: "int" },

      },

      { keys: ["era"], header: "Month ERA", kind: "era", sourceStat: "month_to_date" },
    ];
    const MOBILE_HITTER_COLS_BY_TAB = {
      last_night: [
        { keys: ["atBats", "ab"], header: "AB", kind: "int" },
        { keys: ["runs", "r"], header: "R", kind: "int" },
        { keys: ["hits", "h"], header: "H", kind: "int" },
        { keys: ["rbi", "runsBattedIn"], header: "RBI", kind: "int" },
        { keys: ["baseOnBalls", "bb"], header: "BB", kind: "int" },
        { keys: ["homeRuns", "hr"], header: "HR", kind: "int" },
        { keys: ["doubles"], header: "2B", kind: "int" },

        { keys: ["hits", "h"], header: "H", kind: "int" },
        { keys: ["rbi", "runsBattedIn"], header: "RBI", kind: "int" },
        { keys: ["baseOnBalls", "bb"], header: "BB", kind: "int" },
        { keys: ["homeRuns", "hr"], header: "HR", kind: "int" },
        { keys: ["doubles"], header: "2B", kind: "int" },
        { keys: ["stolenBases"], header: "SB", kind: "int" },
        { keys: ["outfieldAssists", "ofa"], header: "OFA", kind: "int" },
        { keys: ["avg"], header: "AVG", kind: "avg" },
        { keys: ["ops"], header: "OPS", kind: "ops" },
      ],
      season: [
        { keys: ["atBats", "ab"], header: "AB", kind: "int" },
        { keys: ["runs", "r"], header: "R", kind: "int" },
        { keys: ["hits", "h"], header: "H", kind: "int" },
        { keys: ["rbi", "runsBattedIn"], header: "RBI", kind: "int" },
        { keys: ["baseOnBalls", "bb"], header: "BB", kind: "int" },
        { keys: ["homeRuns", "hr"], header: "HR", kind: "int" },
        { keys: ["doubles"], header: "2B", kind: "int" },
        { keys: ["stolenBases"], header: "SB", kind: "int" },
        { keys: ["outfieldAssists", "ofa"], header: "OFA", kind: "int" },
        { keys: ["avg"], header: "AVG", kind: "avg" },
        { keys: ["ops"], header: "OPS", kind: "ops" },
      ],
    };
    const MOBILE_PITCHER_COLS_BY_TAB = {
      last_night: [
        { keys: ["inningsPitched", "ip"], header: "IP", kind: "ip" },
        { keys: ["hits", "hitsAllowed", "h"], header: "H", kind: "int" },
        { keys: ["runs", "r"], header: "R", kind: "int" },
        { keys: ["earnedRuns", "er"], header: "ER", kind: "int" },
        { keys: ["baseOnBalls", "bb"], header: "BB", kind: "int" },
        { keys: ["strikeOuts", "k", "so"], header: "K", kind: "int" },
        {
          keys: ["numberOfPitches", "pitches"],
          header: "Pit (last)",
          kind: "int",
          sourceStat: "last_night",
        },
      ],
      month_to_date: [
        { keys: ["inningsPitched", "ip"], header: "IP", kind: "ip" },
        { keys: ["hits", "hitsAllowed", "h"], header: "H", kind: "int" },
        { keys: ["earnedRuns", "er"], header: "ER", kind: "int" },
        { keys: ["baseOnBalls", "bb"], header: "BB", kind: "int" },
        { keys: ["strikeOuts", "k", "so"], header: "K", kind: "int" },
        { keys: ["era"], header: "ERA", kind: "era" },
      ],
      season: [
        { keys: ["inningsPitched", "ip"], header: "IP", kind: "ip" },
        { keys: ["hits", "hitsAllowed", "h"], header: "H", kind: "int" },
        { keys: ["earnedRuns", "er"], header: "ER", kind: "int" },
        { keys: ["baseOnBalls", "bb"], header: "BB", kind: "int" },
        { keys: ["strikeOuts", "k", "so"], header: "K", kind: "int" },
        { keys: ["era"], header: "ERA", kind: "era" },
      ],
    };

    function el(tag, text = "") {
      const e = document.createElement(tag);
      if (text) e.textContent = text;
      return e;
    }

    function getRaw(stat, keys) {
      if (!stat || typeof stat !== "object") return "";
      for (const k of keys) {
        if (stat[k] !== undefined && stat[k] !== null && stat[k] !== "") return stat[k];
      }
      return "";
    }

    function fmtInt(v) {
      if (v === "" || v === undefined || v === null) return "";
      const n = Number(v);
      return Number.isFinite(n) ? String(Math.round(n)) : String(v);
    }

    /** Baseball-style .xxx for AVG */
    function fmtAvg(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return "";
      const x = n > 1.5 ? n / 1000 : n;
      const s = x.toFixed(3);
      return s.startsWith("0.") ? s.slice(1) : s;
    }

    function fmtOps(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return "";
      const x = n > 4 ? n / 1000 : n;
      return x.toFixed(3);
    }

    function fmtOpsFromStat(stat) {
      let o = getRaw(stat, ["ops"]);
      if (o !== "") return fmtOps(o);
      const obp = Number(getRaw(stat, ["obp", "onBasePercentage"]));
      const slg = Number(getRaw(stat, ["slg", "sluggingPercentage"]));
      if (Number.isFinite(obp) && Number.isFinite(slg)) return (obp + slg).toFixed(3);
      return "";
    }

    function fmtEra(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return "";
      return n.toFixed(2);
    }

    function fmtIp(v) {
      if (v === "" || v === undefined || v === null) return "";
      const t = typeof v === "string" ? v.trim() : "";
      if (t && /^\d+\.[012]$/.test(t)) return t;
      const n = Number(v);
      if (!Number.isFinite(n)) return t || String(v);
      const outs = Math.max(0, Math.round(n * 3));
      const whole = Math.floor(outs / 3);
      const rem = outs % 3;
      return `${whole}.${rem}`;
    }

    function formatStatCell(stat, col) {
      if (!col) return "";
      const raw = getRaw(stat, col.keys);
      switch (col.kind) {
        case "int":
          return fmtInt(raw);
        case "avg":
          return fmtAvg(raw);
        case "ops":
          return fmtOpsFromStat(stat);
        case "era":
          return fmtEra(raw);
        case "ip":
          return fmtIp(raw);
        default:
          return raw === "" ? "" : String(raw);
      }
    }

    function tdWithValue(v) {
      const td = el("td");
      const s = String(v || "");
      if (s.startsWith("http://") || s.startsWith("https://")) {
        const a = el("a", "link");
        a.href = s;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        td.appendChild(a);
      } else {
        td.textContent = s;
      }
      return td;
    }

    function haversineMiles(a, b) {
      const R = 3958.8;
      const toRad = (x) => (x * Math.PI) / 180;
      const dLat = toRad(b.lat - a.lat);
      const dLon = toRad(b.lon - a.lon);
      const q =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(q));
    }

    async function geocodeLocation(name) {
      const key = String(name || "").trim();
      if (!key) return null;
      if (GEO_CACHE.has(key)) return GEO_CACHE.get(key);
      try {
        const u = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(key)}&count=1&language=en&format=json`;
        const r = await fetch(u);
        if (!r.ok) throw new Error(`geo ${r.status}`);
        const js = await r.json();
        const row = (js.results || [])[0];
        const val = row ? { lat: Number(row.latitude), lon: Number(row.longitude) } : null;
        GEO_CACHE.set(key, val);
        return val;
      } catch (_) {
        GEO_CACHE.set(key, null);
        return null;
      }
    }

    function slugifyTeam(s) {
      return String(s || "")
        .trim()
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/\./g, "")
        .replace(/'/g, "")
        .replace(/\s+/g, "-");
    }

    function targetScheduleDate() {
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth(); // 0-based
      const d = now.getDate();
      const lastDay = new Date(y, m + 1, 0).getDate();
      const useNext = d >= lastDay - 2;
      const dt = useNext ? new Date(y, m + 1, 1) : new Date(y, m, 1);
      const yy = dt.getFullYear();
      const mm = String(dt.getMonth() + 1).padStart(2, "0");
      return `${yy}-${mm}-01`;
    }

    const MLB_SLUGS = {
      "Arizona Diamondbacks": "d-backs",
      "Athletics": "athletics",
      "Atlanta Braves": "braves",
      "Baltimore Orioles": "orioles",
      "Boston Red Sox": "red-sox",
      "Chicago Cubs": "cubs",
      "Chicago White Sox": "white-sox",
      "Cincinnati Reds": "reds",
      "Cleveland Guardians": "guardians",
      "Colorado Rockies": "rockies",
      "Detroit Tigers": "tigers",
      "Houston Astros": "astros",
      "Kansas City Royals": "royals",
      "Los Angeles Angels": "angels",
      "Los Angeles Dodgers": "dodgers",
      "Miami Marlins": "marlins",
      "Milwaukee Brewers": "brewers",
      "Minnesota Twins": "twins",
      "New York Mets": "mets",
      "New York Yankees": "yankees",
      "Philadelphia Phillies": "phillies",
      "Pittsburgh Pirates": "pirates",
      "San Diego Padres": "padres",
      "San Francisco Giants": "giants",
      "Seattle Mariners": "mariners",
      "St. Louis Cardinals": "cardinals",
      "Tampa Bay Rays": "rays",
      "Texas Rangers": "rangers",
      "Toronto Blue Jays": "blue-jays",
      "Washington Nationals": "nationals",
    };

    function d1TeamSlug(name) {
      const s = String(name || "").trim().toLowerCase();
      if (!s) return "";
      return s
        .replace(/^university of\s+/, "")
        .replace(/^university\s+/, "")
        .replace(/^uc\s+/, "uc-")
        .replace(/&/g, "and")
        .replace(/\./g, "")
        .replace(/'/g, "")
        .replace(/\s+/g, "-");
    }

    function milbCitySlug(teamName) {
      const t = String(teamName || "").trim();
      if (!t) return "";
      const parts = t.split(/\s+/);
      // Use city/location portion (before nickname), handling common 2-word cities.
      const twoWordStarts = new Set(["Round", "Salt", "San", "Las", "Fort", "Des", "New", "Port", "El"]);
      let city = parts[0] || "";
      if (parts.length >= 2 && twoWordStarts.has(parts[0])) city = `${parts[0]} ${parts[1]}`;
      return slugifyTeam(city);
    }

    function scheduleUrlForRow(row) {
      const dateQ = targetScheduleDate();
      const level = String(row.team_level || "").toUpperCase();
      const team = row.current_team || row.school_or_team || "";
      if (activeTab === "amateur") {
        const schoolSlug = d1TeamSlug(row.school_or_team || row.current_team || "");
        if (schoolSlug) return `https://d1baseball.com/team/${schoolSlug}/schedule/?date=${dateQ}`;
        return "";
      }
      if (activeTab === "high_school") return row.team_schedule_url || "";
      if (level === "MLB") {
        const slug = MLB_SLUGS[team] || slugifyTeam(team.split(/\s+/).slice(-1).join(" "));
        return slug ? `https://www.mlb.com/${slug}/schedule?date=${dateQ}` : "";
      }
      // Rookie/complex levels should use the generic MiLB rookie schedule page.
      const t = String(team || "").toUpperCase();
      if (
        level === "RK" ||
        t.startsWith("ACL ") ||
        t.startsWith("FCL ") ||
        t.startsWith("DSL ") ||
        t.includes(" COMPLEX ")
      ) {
        return `https://www.mlb.com/milb/schedule/rookie?date=${dateQ}`;
      }
      const citySlug = milbCitySlug(team);
      return citySlug ? `https://www.milb.com/${citySlug}/schedule?date=${dateQ}` : "";
    }

    function restaurantUrlForSeries(s) {
      const q = [s.venue || "", s.location || ""].filter(Boolean).join(", ");
      if (!q) return "";
      return `https://www.yelp.com/search?find_desc=restaurants&find_loc=${encodeURIComponent(q)}`;
    }

    function baseCols(row, mobileMode = false) {
      if (mobileMode) return [row.name || "", row.position || "", row.last_night_boxscore_url || ""];
      const cols = [
        row.name || "",
        row.agent || "",
        row.position || "",
        row.team_level || "",
        row.current_team || row.school_or_team || "",
      ];
      // MLB tab: hide organization column as requested.
      if (activeTab !== "mlb") cols.splice(4, 0, row.organization || row.major_affiliate || "");
      return cols;
    }

    function statForCol(row, defaultStatKey, col) {
      const key = col && col.sourceStat ? col.sourceStat : defaultStatKey;
      const st = row && row[key];
      return st && typeof st === "object" ? st : {};
    }

    function buildStatTable(rows, statKey, tbodyId, cols, panelKeyPrefix) {
      const table = el("table");
      table.className = "stats-table";
      const thead = el("thead");
      const hr = el("tr");
      let baseHeaders = activeView === "mobile" ? BASE_HEADERS_MOBILE : BASE_HEADERS_DESKTOP;
      if (activeView !== "mobile" && activeTab === "mlb") {
        baseHeaders = BASE_HEADERS_DESKTOP.filter((h) => h !== "Organization");
      }
      const headers = [...baseHeaders, ...cols.map((c) => c.header)];
      headers.forEach((h, i) => {
        const th = el("th", h);
        th.className = "sortable";
        const colIdx = i;
        th.onclick = () => sortTable(`${panelKeyPrefix}-${tbodyId}`, colIdx);
        hr.appendChild(th);
      });
      thead.appendChild(hr);
      table.appendChild(thead);
      const tbody = el("tbody");
      tbody.id = `tbody-${panelKeyPrefix}-${tbodyId}`;
      const totalColumns = (activeView === "mobile" ? BASE_HEADERS_MOBILE.length : baseHeaders.length) + cols.length;
      rows.forEach((r) => {
        const tr = el("tr");
        const statVals = cols.map((c) => formatStatCell(statForCol(r, statKey, c), c));
        const hasStats = statVals.some((v) => {
          const s = String(v ?? "").trim();
          return s !== "" && s.toUpperCase() !== "N/A";
        });
        if (!hasStats) {
          const td = el("td");
          td.colSpan = totalColumns;
          td.innerHTML = `<em>${r.name || "Player"}: Team stats not on maxpreps</em>`;
          tr.appendChild(td);
        } else {
          [
            ...baseCols(r, activeView === "mobile"),
            ...(activeView === "mobile" ? [] : [scheduleUrlForRow(r), r.last_night_boxscore_url || ""]),
            ...statVals,
          ].forEach((v, i) => {
            const td = tdWithValue(v);
            if (i === 0) td.classList.add("text-left");
            tr.appendChild(td);
          });
        }
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      return table;
    }

    function sortTable(fullId, colIdx) {
      const tbody = document.getElementById(`tbody-${fullId}`);
      if (!tbody) return;
      const key = `${fullId}:${colIdx}`;
      sortState[key] = !sortState[key];
      const asc = sortState[key];
      const trs = Array.from(tbody.querySelectorAll("tr"));
      trs.sort((a, b) => {
        const av = (a.children[colIdx]?.textContent || "").trim();
        const bv = (b.children[colIdx]?.textContent || "").trim();
        const an = parseFloat(av.replace(/^\.?/, "0."));
        const bn = parseFloat(bv.replace(/^\.?/, "0."));
        if (!Number.isNaN(an) && !Number.isNaN(bn) && av !== "" && bv !== "")
          return asc ? an - bn : bn - an;
        return asc ? av.localeCompare(bv) : bv.localeCompare(av);
      });
      trs.forEach((r) => tbody.appendChild(r));
    }

    function renderStatsTable(rows, statKey, target, panelKey) {
      target.innerHTML = "";
      const hitters = rows.filter((r) => !r.is_pitcher);
      const pitchers = rows.filter((r) => r.is_pitcher);
      const wrap = el("div");
      wrap.className = "stats-wrap";

      const hitterCols =
        activeView === "mobile" ? MOBILE_HITTER_COLS_BY_TAB[statKey] || MOBILE_HITTER_COLS_BY_TAB.season : HITTER_COLS;
      const pitcherCols =
        activeView === "mobile" ? MOBILE_PITCHER_COLS_BY_TAB[statKey] || MOBILE_PITCHER_COLS_BY_TAB.season : PITCHER_COLS;

      if (activeRole === "hitters") {
        if (!hitters.length) {
          target.appendChild(el("p", "No hitters in this view."));
          return;
        }
        target.appendChild(buildStatTable(hitters, statKey, "hit", hitterCols, panelKey));
        return;
      }
      if (activeRole === "pitchers") {
        if (!pitchers.length) {
          target.appendChild(el("p", "No pitchers in this view."));
          return;
        }
        target.appendChild(buildStatTable(pitchers, statKey, "pit", pitcherCols, panelKey));
        return;
      }

      /* All: hitters on top, pitchers on bottom */
      if (hitters.length) {
        const h2h = el("h2", "Hitters");
        h2h.className = "stats-section-title";
        wrap.appendChild(h2h);
        wrap.appendChild(buildStatTable(hitters, statKey, "hit", hitterCols, panelKey));
      }
      if (pitchers.length) {
        const h2 = el("h2", "Pitchers");
        h2.className = "stats-section-title";
        wrap.appendChild(h2);
        wrap.appendChild(buildStatTable(pitchers, statKey, "pit", pitcherCols, panelKey));
      }
      if (!hitters.length && !pitchers.length) {
        wrap.appendChild(el("p", "No clients in this view."));
      }
      target.appendChild(wrap);
    }

    function renderScheduleTable(rows, target, panelKey) {
      const table = el("table");
      table.className = "stats-table";
      const thead = el("thead");
      const hr = el("tr");
      let headers = [
        "Name",
        "Agent Initials",
        "Pos",
        "Level",
        "Organization",
        "Current Team",
        "Team Schedule",
        "Opponent",
        "Home/Away",
        "Venue",
        "Series Start",
        "Series End",
        "Location",
        "Nearest Airport Code",
        "Restaurants",
      ];
      if (activeTab === "mlb") headers = headers.filter((h) => h !== "Organization");
      headers.forEach((h, i) => {
        const th = el("th", h);
        th.className = "sortable";
        th.onclick = () => sortTable(`${panelKey}-sched`, i);
        hr.appendChild(th);
      });
      thead.appendChild(hr);
      table.appendChild(thead);
      const tbody = el("tbody");
      tbody.id = `tbody-${panelKey}-sched`;
      rows.forEach((r) => {
        (r.upcoming_series || []).forEach((s) => {
          const tr = el("tr");
          const vals = [
            r.name,
            r.agent || "",
            r.position || "",
            r.team_level || "",
            r.current_team,
            scheduleUrlForRow(r),
            s.opponent,
            s.home_away,
            s.venue,
            s.start_date,
            s.end_date,
            s.location,
            s.nearest_airport_code,
            restaurantUrlForSeries(s),
          ];
          if (activeTab !== "mlb") vals.splice(4, 0, r.organization || r.major_affiliate || "");
          vals.forEach((v, i) => {
            const td = tdWithValue(v);
            if (i === 0) td.classList.add("text-left");
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      });
      table.appendChild(tbody);
      target.innerHTML = "";
      target.appendChild(table);
    }

    function rowsForTab(tab) {
      if (!DATA) return [];
      if (tab === "mlb") return (DATA.pro_clients || []).filter((r) => String(r.team_level || "").toUpperCase() === "MLB");
      if (tab === "milb")
        return (DATA.pro_clients || []).filter((r) => String(r.team_level || "").toUpperCase() !== "MLB");
      if (tab === "amateur") return DATA.amateur_clients || [];
      if (tab === "high_school") return DATA.high_school_clients || [];
      return [];
    }

    function allowedMainTabs() {
      if (!ACCESS_PROFILE) return ["mlb", "milb", "amateur", "high_school"];
      if (ACCESS_PROFILE.key === "partner") return ["mlb", "milb"];
      return ["mlb", "milb", "amateur", "high_school"];
    }

    function roleFilter(rows) {
      if (activeRole === "pitchers") return rows.filter((r) => r.is_pitcher);
      if (activeRole === "hitters") return rows.filter((r) => !r.is_pitcher);
      return rows;
    }

    function render() {
      if (!DATA) return;
      document.getElementById("meta").textContent = `Generated: ${DATA.generated_at}`;
      const d = (DATA.last_night_date || "").split("-");
      const md = d.length === 3 ? `${Number(d[1])}/${Number(d[2])}` : DATA.last_night_date;
      document.getElementById("lastNightLabel").textContent = `LAST NIGHT DATE: ${md}`;
      const showSchedule = !(activeView === "mobile");
      document.querySelectorAll("#subTabs button").forEach((b) => {
        if (b.dataset.subtab === "schedule") b.style.display = showSchedule ? "" : "none";
      });
      if (!showSchedule && activeSubtab === "schedule") activeSubtab = "last_night";

      const allowed = new Set(allowedMainTabs());
      document.querySelectorAll("#mainTabs button").forEach((b) => {
        b.style.display = allowed.has(b.dataset.tab) ? "" : "none";
      });
      if (!allowed.has(activeTab)) activeTab = "mlb";

      ["mlb", "milb", "amateur", "high_school"].forEach((t) => {
        const panel = document.getElementById(`panel-${t}`);
        if (!allowed.has(t)) {
          panel.classList.remove("active");
          panel.innerHTML = "";
          return;
        }
        const baseRows = rowsForTab(t);
        const rows = roleFilter(baseRows);
        const panelKey = `${t}-${activeSubtab}-${activeRole}`;
        if (activeSubtab === "schedule") renderScheduleTable(rows, panel, panelKey);
        else renderStatsTable(rows, activeSubtab, panel, panelKey);
      });
      document.getElementById("roleTabs").style.display = activeView === "mobile" ? "none" : "";
      document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
      document.getElementById(`panel-${activeTab}`).classList.add("active");
    }

    function wireTabs() {
      document.querySelectorAll("#viewTabs button").forEach((b) => {
        b.onclick = () => {
          activeView = b.dataset.view;
          document.querySelectorAll("#viewTabs button").forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          render();
        };
      });
      document.querySelectorAll("#mainTabs button").forEach((b) => {
        b.onclick = () => {
          activeTab = b.dataset.tab;
          document.querySelectorAll("#mainTabs button").forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          render();
        };
      });
      document.querySelectorAll("#subTabs button").forEach((b) => {
        b.onclick = () => {
          activeSubtab = b.dataset.subtab;
          document.querySelectorAll("#subTabs button").forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          render();
        };
      });
      document.querySelectorAll("#roleTabs button").forEach((b) => {
        b.onclick = () => {
          activeRole = b.dataset.role;
          document.querySelectorAll("#roleTabs button").forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          render();
        };
      });
    }

    function authenticateUser() {
      for (let i = 0; i < 4; i += 1) {
        const pw = window.prompt("Enter Apex access password");
        if (pw === null) return false;
        const profile = PASSWORD_PROFILES[pw.trim()];
        if (profile) {
          ACCESS_PROFILE = profile;
          return true;
        }
        window.alert("Invalid password.");
      }
      return false;
    }

    async function buildNearbySeriesRows(center) {
      const includeAmateur = !ACCESS_PROFILE || ACCESS_PROFILE.key !== "partner";
      const allRows = includeAmateur
        ? [...(DATA.pro_clients || []), ...(DATA.amateur_clients || [])]
        : [...(DATA.pro_clients || [])];
      const out = [];
      const now = new Date();
      for (const r of allRows) {
        for (const s of r.upcoming_series || []) {
          const ds = String(s.start_date || "");
          const dt = ds ? new Date(`${ds}T00:00:00`) : null;
          if (!dt || Number.isNaN(dt.getTime())) continue;
          const days = Math.floor((dt - now) / (1000 * 60 * 60 * 24));
          if (days < 0 || days > 21) continue;
          const geo = await geocodeLocation(`${s.location || ""} ${s.venue || ""}`.trim());
          if (!geo) continue;
          const miles = haversineMiles(center, geo);
          if (miles > 100) continue;
          out.push({
            week: days <= 7 ? "Week 1 (0-7 days)" : days <= 14 ? "Week 2 (8-14 days)" : "Week 3 (15-21 days)",
            name: r.name,
            team: r.current_team || r.school_or_team || "",
            opponent: s.opponent || "",
            location: `${s.location || ""}${s.venue ? ` (${s.venue})` : ""}`,
            date: s.start_date || "",
            miles: Math.round(miles),
          });
        }
      }
      out.sort((a, b) => a.date.localeCompare(b.date) || a.miles - b.miles);
      return out;
    }

    function showNearbyModal(rows, loading = false) {
      const overlay = el("div");
      overlay.className = "overlay";
      overlay.id = "nearbySeriesOverlay";
      const modal = el("div");
      modal.className = "modal";
      const head = el("div");
      head.className = "modal-head";
      head.appendChild(el("h2", "Nearby Player Series (next 21 days)"));
      const close = el("button", "X");
      close.className = "modal-close";
      close.onclick = () => overlay.remove();
      head.appendChild(close);
      modal.appendChild(head);
      if (loading) {
        modal.appendChild(el("p", "Loading nearby series..."));
      } else if (!rows.length) {
        modal.appendChild(el("p", "No upcoming series within 100 miles for your location profile."));
      } else {
        const groups = ["Week 1 (0-7 days)", "Week 2 (8-14 days)", "Week 3 (15-21 days)"];
        groups.forEach((g) => {
          const gRows = rows.filter((r) => r.week === g);
          if (!gRows.length) return;
          modal.appendChild(el("h3", g));
          const t = el("table");
          const h = el("tr");
          ["Player", "Team", "Opponent", "Location", "Date", "Miles"].forEach((x) => h.appendChild(el("th", x)));
          t.appendChild(h);
          gRows.forEach((r) => {
            const tr = el("tr");
            [r.name, r.team, r.opponent, r.location, r.date, String(r.miles)].forEach((x) => tr.appendChild(el("td", x)));
            t.appendChild(tr);
          });
          modal.appendChild(t);
        });
      }
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
    }

    async function load() {
      if (!authenticateUser()) {
        document.body.innerHTML = "<h2>Access cancelled.</h2>";
        return;
      }
      try {
        const r = await fetch("/api/data");
        if (!r.ok) throw new Error(`api ${r.status}`);
        DATA = await r.json();
      } catch (_) {
        const r2 = await fetch("./apex_dashboard_data.json");
        if (!r2.ok) throw new Error(`json ${r2.status}`);
        DATA = await r2.json();
      }
      wireTabs();
      render();
      if (ACCESS_PROFILE && ACCESS_PROFILE.center) {
        showNearbyModal([], true);
        const rows = await buildNearbySeriesRows(ACCESS_PROFILE.center);
        const existing = document.getElementById("nearbySeriesOverlay");
        if (existing) existing.remove();
        showNearbyModal(rows);
      }
    }

    load().catch((err) => {
      document.body.appendChild(el("pre", String(err)));
    });
  </script>
</body>
</html>
